<div class="ramschema-container">
  <h1>Mitt ramschema</h1>

  <p>Totalt: {{ totalPoints }} hp</p>

  <p *ngIf="courses.length === 0">Inga kurser tillagda ännu.</p>

  <table *ngIf="courses.length > 0">
    <thead>
      <tr>
        <th>Kurskod</th>
        <th>Kursnamn</th>
        <th>Poäng</th>
        <th>Ämne</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let course of courses">
        <td>{{ course.courseCode }}</td>
        <td>{{ course.courseName }}</td>
        <td>{{ course.points }}</td>
        <td>{{ course.subject }}</td>
        <td><button (click)="removeCourse(course.courseCode)">Ta bort</button></td>
      </tr>
    </tbody>
  </table>
</div>
