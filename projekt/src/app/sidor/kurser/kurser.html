<div class="kurser-container">
  <h1>Kurser</h1>

  <div class="filter-bar">
    <input type="text" placeholder="Sök på kurskod eller kursnamn..." [ngModel]="searchText()" (ngModelChange)="searchText.set($event)" />
    <select [ngModel]="selectedSubject()" (ngModelChange)="selectedSubject.set($event)">
      <option value="">Alla ämnen</option>
      <option *ngFor="let subject of subjects()" [value]="subject">{{ subject }}</option>
    </select>
  </div>

  <p>Visar {{ filteredCourses().length }} kurser</p>

  <table>
    <thead>
      <tr>
        <th (click)="sort('courseCode')">Kurskod</th>
        <th (click)="sort('courseName')">Kursnamn</th>
        <th (click)="sort('points')">Poäng</th>
        <th (click)="sort('subject')">Ämne</th>
        <th>Nivå</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let course of filteredCourses()">
        <td>{{ course.courseCode }}</td>
        <td>{{ course.courseName }}</td>
        <td>{{ course.points }}</td>
        <td>{{ course.subject }}</td>
        <td>{{ course.level }}</td>
        <td><button (click)="addToSchedule(course)">+ Lägg till</button></td>
      </tr>
    </tbody>
  </table>
</div>
